# Production Configuration for AWS EC2 Deployment
# Activated via --spring.profiles.active=prod

# PostgreSQL Database Configuration for production
spring.datasource.url=jdbc:postgresql://localhost:5432/surveyplatform
spring.datasource.username=surveyapp
spring.datasource.password=SurveyApp2024!

# JPA/Hibernate - update schema automatically
spring.jpa.hibernate.ddl-auto=update

# Logging - reduce verbosity in production
logging.level.com.surveyplatform=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
