# Application configuration for Serverless Polling and Survey Platform
spring.application.name=survey-platform

# PostgreSQL Database Configuration for local development
spring.datasource.url=jdbc:postgresql://localhost:5432/surveyplatform
spring.datasource.username=default
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration - auto-create tables from entity definitions
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080

# JWT Configuration - secret key for signing tokens (use env variable in production)
jwt.secret=SurveyPlatformSecretKeyForJWTTokenGeneration2024VerySecure
jwt.expiration=86400000

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging Configuration
logging.level.com.surveyplatform=INFO
logging.level.org.springframework.security=WARN
