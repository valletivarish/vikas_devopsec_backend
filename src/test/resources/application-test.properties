# Test configuration using H2 in-memory database instead of PostgreSQL
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA configuration for H2 in-memory database
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT configuration for tests
jwt.secret=TestSecretKeyForJWTTokenGenerationInTestEnvironmentVerySecure
jwt.expiration=86400000

# Disable OpenAPI in tests
springdoc.api-docs.enabled=false
