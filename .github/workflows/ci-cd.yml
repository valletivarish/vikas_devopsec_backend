# CI/CD Pipeline for Survey Platform Backend
# Triggers on push to main and pull requests for continuous integration
# CD stage deploys to AWS EC2 only on push to main branch
name: Backend CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # =============================================
  # CI Stage: Build, Test, Analyze, and Scan
  # =============================================
  ci:
    name: CI - Build, Test, and Analyze
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the source code from the repository
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Set up Java 17 with Maven caching for faster builds
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # =============================================
      # BUILD AND TEST PHASE
      # =============================================

      # Step 3: Install project dependencies and compile the code
      - name: Build with Maven
        run: mvn clean compile -B

      # Step 4: Run unit and integration tests with JaCoCo coverage agent
      - name: Run Tests with Coverage
        run: mvn test -B

      # Step 5: Generate JaCoCo code coverage report
      - name: Generate JaCoCo Coverage Report
        run: mvn jacoco:report -B

      # =============================================
      # STATIC CODE ANALYSIS PHASE
      # =============================================

      # Step 6: Run SpotBugs with FindSecBugs plugin for static analysis and security bug detection
      # SpotBugs identifies common bug patterns; FindSecBugs extends it with security-focused rules
      # covering OWASP Top 10 vulnerabilities like SQL injection, XSS, and insecure cryptography
      - name: SpotBugs with FindSecBugs (SAST)
        run: mvn com.github.spotbugs:spotbugs-maven-plugin:spotbugs com.github.spotbugs:spotbugs-maven-plugin:check -B
        continue-on-error: true

      # Step 7: Run PMD for code quality analysis detecting code smells, dead code, and complexity issues
      # PMD performs static analysis to find common programming flaws and suboptimal code patterns
      - name: PMD Code Quality Analysis
        run: mvn pmd:check -B
        continue-on-error: true

      # =============================================
      # SECURITY VULNERABILITY SCANNING PHASE
      # =============================================

      # Step 8: Run Grype vulnerability scanner for deep dependency analysis (SCA)
      # Grype is Anchore's open-source vulnerability scanner that matches packages against known CVEs
      # from multiple vulnerability databases including NVD, GitHub Advisory, and OS-specific databases
      - name: Grype Dependency Vulnerability Scan (SCA)
        uses: anchore/scan-action@v6
        with:
          path: '.'
          fail-build: false
          severity-cutoff: high
          output-format: table

      # Step 9: Run Trivy filesystem vulnerability scan on source code and dependencies
      # Trivy detects vulnerabilities in OS packages, language-specific packages, and misconfigurations
      - name: Trivy Filesystem Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
        continue-on-error: true

      # Step 10: Generate Trivy SBOM in CycloneDX format for software supply chain transparency
      # SBOM provides a complete inventory of all components and their versions
      - name: Trivy SBOM Generation (CycloneDX)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'cyclonedx'
          output: 'sbom-backend.json'
        continue-on-error: true

      # =============================================
      # SECRET SCANNING PHASE
      # =============================================

      # Step 11: Run Gitleaks to scan the git history for accidentally committed secrets
      # Detects API keys, tokens, passwords, and other sensitive data in the repository history
      - name: Gitleaks Secret Scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # =============================================
      # ARTIFACT UPLOAD PHASE
      # =============================================

      # Step 12: Upload SpotBugs analysis report as CI artifact for review
      - name: Upload SpotBugs Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spotbugs-report
          path: target/spotbugs/

      # Step 13: Upload PMD analysis report as CI artifact for review
      - name: Upload PMD Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pmd-report
          path: target/pmd*

      # Step 14: Upload JaCoCo code coverage report as CI artifact
      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/

      # Step 15: Upload test results as CI artifact
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/

      # Step 16: Upload Trivy SBOM for software supply chain auditing
      - name: Upload Trivy SBOM
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sbom-backend
          path: sbom-backend.json

      # =============================================
      # PACKAGING PHASE
      # =============================================

      # Step 18: Package the application as a JAR for deployment
      - name: Package Application
        run: mvn package -B -DskipTests

      # Step 19: Upload the packaged JAR as a deployment artifact
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: target/*.jar

  # =============================================
  # CD Stage: Deploy to AWS EC2 (only on push to main)
  # =============================================
  cd:
    name: CD - Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # Step 1: Download the packaged JAR artifact from CI stage
      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: ./target

      # Step 2: Copy JAR to EC2 via SCP
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          source: "target/*.jar"
          target: "/tmp/"
          strip_components: 1

      # Step 3: Deploy the JAR to EC2 instance via SSH
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Stop existing application if running
            sudo systemctl stop surveyplatform || true
            # Copy the new JAR file to the deployment directory
            cp /tmp/*.jar /home/ec2-user/app.jar
            # Ensure systemd service uses prod profile for database credentials
            sudo tee /etc/systemd/system/surveyplatform.service > /dev/null <<'SVCEOF'
            [Unit]
            Description=Survey Platform Backend
            After=network.target postgresql.service

            [Service]
            User=ec2-user
            WorkingDirectory=/home/ec2-user
            ExecStart=/usr/bin/java -jar /home/ec2-user/app.jar --spring.profiles.active=prod
            SuccessExitStatus=143
            Restart=always
            RestartSec=10

            [Install]
            WantedBy=multi-user.target
            SVCEOF
            sudo systemctl daemon-reload
            # Start the application using systemd
            sudo systemctl start surveyplatform

      # Step 4: Smoke test to verify deployment was successful
      - name: Smoke Test - Health Check
        run: |
          echo "Waiting for application to start..."
          for i in $(seq 1 12); do
            if curl -sf http://${{ secrets.EC2_HOST }}:8080/api/health; then
              echo ""
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i/12 - retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 2 minutes - verify manually"
          exit 1
